<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letras Slideshow</title>

    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.ts" defer></script>
  </head>
  <body>
    <div id="popup" data-state="loading">
      <div id="loading" class="state">
        <p></p>
      </div>

      <div id="success" class="state">
        <h1 id="title"></h1>
        <h2 id="artist"></h2>
      </div>

      <div id="error" class="state">
        <p></p>
      </div>

      <div class="actions">
        <button type="button" class="primary" disabled></button>
        <button type="button" class="secondary" disabled></button>
      </div>
    </div>
  </body>
</html>

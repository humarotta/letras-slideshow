<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="extension.name"></title>

    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.ts" defer></script>
  </head>
  <body>
    <div id="popup" data-state="loading">
      <div id="loading" class="state">
        <p data-i18n="popup.loading"></p>
      </div>

      <div id="success" class="state">
        <p id="title"></p>
        <p id="artist"></p>
      </div>

      <div id="error" class="state">
        <p data-i18n="popup.error"></p>
      </div>

      <div class="actions">
        <button type="button" id="primary" data-i18n="popup.present"></button>
        <button type="button" id="secondary" data-i18n="popup.download"></button>
      </div>
    </div>
  </body>
</html>
